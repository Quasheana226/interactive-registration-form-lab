<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Form Validation</title>
</head>

<body>
    <div class="container">

        <form class="form">
            <h1>Join My Crew!</h1>

            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required />
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="quantity">Quantity (21-1000):</label>
                <input type="number" id="quantity" name="quantity" min="21" max="1000" step="1" required>
            </div>

            <div class="form-group">
                <label for="website">Website:</label>
                <input type="url" id="website" name="website">
            </div>

            <div class="form-group">
                <label for="password">Password (min 8 characters):</label>
                <input type="password" id="password" name="password" minlength="8" required>
            </div>

            <div class="form-group">
                <label for="age">Age (must be 18 or older):</label>
                <input type="number" id="age" name="age" min="18" required>
            </div>

            <div class="form-group">
                <label for="zipcode">Zip Code (5 digits):</label>
                <input type="text" id="zipcode" name="zipcode" pattern="\d{5}" title="Please enter a 5-digit zip code"
                    required>
            </div>

        </form>

        <aside class="aside">
            <img src="./images/sunny.gif" alt="1000 Sunny!">
        </aside>


    </div>

</body>

</html>
